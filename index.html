<!DOCTYPE html>
<html>
<head>
    <title>Desenhar figuras</title>
</head>
<body>

    <h2>Dibujador de Asteriscos</h2>

    <label>Tamaño del lado:</label>
    <input type="number" id="lado" value="5">
    <br><br>

    <button onclick="dibujar('cuadrado')">Dibujar Cuadrado</button>
    <button onclick="dibujar('triangulo')">Dibujar Triángulo</button>

    <pre id="resultado"></pre>

    <hr> <h3>Ordenador de Números</h3>
<input type="text" id="listaNumeros" placeholder="Ej: 5,2,8,1">
<button onclick="ejecutarOrdenacion('Asc')">Ordem Ascendente</button>
<button onclick="ejecutarOrdenacion('Desc')">Ordem Descendente</button>

<p id="resultadoOrden"></p>

<hr>
<h3>Marco de Asteriscos</h3>
<input type="text" id="textoMarco" placeholder="Escribe una frase aquí">
<button onclick="ejecutarMarco()">Crear Marco</button>
<pre id="resultadoMarco"></pre>

<hr>
<h3>Encontrar el Segundo Más Grande</h3>
<input type="text" id="listaParaSegundo" placeholder="Ej: 5, 12, 8, 20">
<button onclick="ejecutarSegundoGrande()">Calcular</button>
<p id="resultadoSegundo"></p>


<hr>
<h3>Calculadora de Daño Pokémon</h3>
<label>Atacante:</label>
<select id="tipoAtacante">
    <option value="Fuego">Fuego</option>
    <option value="Agua">Agua</option>
    <option value="Planta">Planta</option>
    <option value="Eléctrico">Eléctrico</option>
</select>

<label>Defensor:</label>
<select id="tipoDefensor">
    <option value="Fuego">Fuego</option>
    <option value="Agua">Agua</option>
    <option value="Planta">Planta</option>
    <option value="Eléctrico">Eléctrico</option>
</select>
<br><br>
<label>Ataque (1-100):</label>
<input type="number" id="puntosAtaque" value="50" min="1" max="100">
<label>Defensa (1-100):</label>
<input type="number" id="puntosDefensa" value="50" min="1" max="100">
<br><br>
<button onclick="ejecutarBatalla()">Calcular Daño - Pokémon</button>
<p id="resultadoPokemon"></p>

<hr>
<h3>Maiúscula</h3>
<input type="text" id="textoOriginal" placeholder="escreva sua frase">
<button onclick="ejecutarCapitalizar()">Maiúscula</button>
<p id="resultadoCapitalizado"></p>

<hr>
<h3>Vogal mais frequente</h3>
<input type="text" id="textoVocales" placeholder="Escreva aqui">
<button onclick="ejecutarVocal()">Encontrar Vogal</button>
<p id="resultadoVocal"></p>

    <script src="/java.js"></script>
</body>
</html>
